services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wlib
      POSTGRES_USER: wlib
      # Измените этот пароль для продакшна
      POSTGRES_PASSWORD: wlib_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wlib -d wlib"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn mybooksite.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    environment:
      - SECRET_KEY=django-insecure-dev-key-change-in-prod
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1,web
      - DB_NAME=wlib
      - DB_USER=wlib
      - DB_PASSWORD=wlib_password
      - DB_HOST=db
      - DB_PORT=5432
      - EMAIL_HOST_USER=
      - EMAIL_HOST_PASSWORD=
      - DEFAULT_FROM_EMAIL=Wlib
    volumes:
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
